name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pio test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS-13 dropped from the v0.x matrix: free GitHub Actions macOS
        # runners were queueing for 40+ minutes without starting (Ubuntu jobs
        # completed in 25-30s). We have no macOS-specific code yet — re-add
        # macos-13 (or macos-14) to this matrix as soon as T1 introduces any
        # platform-sensitive code, or earlier if a contributor needs the
        # coverage.
        os: [ubuntu-22.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio

      - name: PlatformIO version
        run: pio --version

      - name: Run native tests
        run: pio test -e native

      - name: Validate library.json packs
        run: pio package pack --output /tmp/lib.tar.gz
