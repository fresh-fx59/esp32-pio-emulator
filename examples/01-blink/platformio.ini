[env:native]
platform = native
test_framework = unity
; PIO filters libraries by platform + framework with default lib_compat_mode=soft.
; Our lib's library.json declares frameworks=arduino because that's what users'
; sketches target on real hardware. The [env:native] test env has no framework,
; so PIO would otherwise filter us out. lib_compat_mode=off disables that filter.
lib_compat_mode = off
; Compile the sketch (src/main.cpp with setup/loop) into the test binary so
; tests can drive it via Sim::runSetup() / runLoop(). Without this PIO defaults
; to false for test envs, and tests fall through to the framework's weak
; no-op setup/loop — pin levels never change.
test_build_src = true
lib_deps =
    https://github.com/fresh-fx59/esp32-pio-emulator
build_flags = -std=gnu++17
